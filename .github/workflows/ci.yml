name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  # ── Laravel Tests ──────────────────────────────────────────────────────────
  laravel-tests:
    name: Laravel Tests (PHP 8.3)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: createrhub_test
          POSTGRES_USER: createrhub
          POSTGRES_PASSWORD: secret
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo, pdo_pgsql, mbstring, zip, exif, pcntl, bcmath, gd, intl, redis
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Set up .env.testing
        working-directory: backend
        run: |
          cp .env.example .env.testing
          sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=pgsql/' .env.testing
          sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/' .env.testing
          sed -i 's/DB_PORT=.*/DB_PORT=5432/' .env.testing
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=createrhub_test/' .env.testing
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=createrhub/' .env.testing
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=secret/' .env.testing
          sed -i 's/CACHE_STORE=.*/CACHE_STORE=redis/' .env.testing
          sed -i 's/QUEUE_CONNECTION=.*/QUEUE_CONNECTION=sync/' .env.testing

      - name: Generate application key
        working-directory: backend
        run: php artisan key:generate --env=testing

      - name: Run migrations
        working-directory: backend
        run: php artisan migrate --env=testing --force

      - name: Run tests
        working-directory: backend
        run: php artisan test --env=testing

  # ── Next.js Lint + Typecheck ───────────────────────────────────────────────
  nextjs-ci:
    name: Next.js Lint + Types (Node 20)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Lint
        working-directory: frontend
        run: npm run lint
