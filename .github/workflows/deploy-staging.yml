name: Deploy to Staging

on:
  push:
    branches: [develop]

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      # ── Build Next.js ──────────────────────────────────────────────────────
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.STAGING_API_URL }}
        run: npm run build

      # ── SSH Deploy ─────────────────────────────────────────────────────────
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/createrhub

            # Pull latest code
            git fetch origin develop
            git checkout develop
            git reset --hard origin/develop

            # Laravel: install deps + migrate
            cd backend
            composer install --no-interaction --prefer-dist --optimize-autoloader
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            # Next.js: copy build artifact + restart
            cd ../frontend
            npm ci --omit=dev
            cp -r .next/standalone /srv/frontend-next/
            cp -r .next/static /srv/frontend-next/.next/static
            cp -r public /srv/frontend-next/public

            # Restart services
            sudo systemctl reload php8.3-fpm
            pm2 reload createrhub-frontend --update-env

            echo "✓ Staging deploy complete"
